version: '3.8'

# myGaïa Platform — Production (full on-premise)
# Prérequis : copier infra/.env.prod.example en infra/.env.prod et remplir les valeurs
# Lancer : docker compose -f infra/docker-compose.prod.yml --env-file infra/.env.prod up -d
#
# Supabase tourne dans son propre compose (voir /opt/supabase/docker-compose.yml)
# Les deux stacks communiquent via le réseau externe "supabase_network"

services:

  # ── Nginx ── Reverse proxy + SSL ────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cgp-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - web
      - api
    networks:
      - cgp
      - supabase_network
    restart: unless-stopped

  # ── Web ── Next.js 14 ────────────────────────────────────────
  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL}
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: cgp-web
    environment:
      NODE_ENV: production
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - cgp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── API ── Fastify ───────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    container_name: cgp-api
    environment:
      NODE_ENV: production
      PORT: 3001
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-cgp-documents}
      MINIO_USE_SSL: "false"
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - cgp
      - supabase_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:alpine
    container_name: cgp-redis
    volumes:
      - redis_data:/data
    networks:
      - cgp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO ── Stockage S3 documents ───────────────────────────
  minio:
    image: minio/minio
    container_name: cgp-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - cgp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── MinIO Init ── Crée le bucket au premier démarrage ────────
  minio-init:
    image: minio/mc
    container_name: cgp-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY};
        mc mb --ignore-existing local/${MINIO_BUCKET:-cgp-documents};
        echo 'Bucket prêt (accès privé — URLs presignées uniquement)';
        exit 0;
      "
    restart: "no"

  # ── Mailpit ── SMTP (désactiver en prod si SMTP externe) ─────
  mailpit:
    image: axllent/mailpit
    container_name: cgp-mailpit
    expose:
      - "1025"
    ports:
      - "127.0.0.1:8025:8025"   # Interface web accessible en local uniquement
    restart: unless-stopped

networks:
  cgp:
    driver: bridge
  supabase_network:
    external: true   # Créé par le docker-compose Supabase

volumes:
  redis_data:
  minio_data:
  nginx_logs:
